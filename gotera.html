<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gotera Documentation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray-50: #fafafa;
      --gray-100: #f4f4f4;
      --gray-200: #e8e8e8;
      --gray-300: #d0d0d0;
      --gray-400: #a0a0a0;
      --gray-500: #707070;
      --gray-700: #404040;
      --gray-900: #141414;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 200;
    }

    .topbar-brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
    }

    .topbar-brand span { color: var(--gray-500); }

    .topbar-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray-500);
      letter-spacing: 1px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: 52px;
      min-height: calc(100vh - 52px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 256px;
      flex-shrink: 0;
      background: var(--gray-50);
      border-right: 1px solid var(--gray-200);
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 28px 0;
    }

    .sidebar-group-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 16px 20px 6px;
      display: block;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px;
      font-size: 13px;
      color: var(--gray-500);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .sidebar a:hover {
      color: var(--black);
      background: var(--gray-200);
      border-left-color: var(--gray-400);
    }

    .sidebar a.active {
      color: var(--black);
      background: var(--white);
      border-left-color: var(--black);
      font-weight: 500;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      max-width: 800px;
      padding: 56px 64px 96px;
    }

    /* ── HERO ── */
    .doc-hero {
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 48px;
      margin-bottom: 56px;
    }

    .doc-hero-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--gray-400);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .doc-hero h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .doc-hero p {
      font-size: 16px;
      color: var(--gray-500);
      max-width: 520px;
      line-height: 1.7;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--black);
      text-decoration: none;
      border: 1px solid var(--black);
      padding: 10px 20px;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: var(--black);
      color: var(--white);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/" class="topbar-brand">gebeta<span>_docs</span></a>
    <div class="topbar-meta">v1.0.0 &mdash; Gotera Core</div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-group">
        <span class="sidebar-group-label">Getting Started</span>
        <a href="#" class="active">Introduction</a>
        <a href="#">Setup & Installation</a>
      </div>
      <div class="sidebar-group">
        <span class="sidebar-group-label">Modules</span>
        <a href="#">Inventory</a>
        <a href="#">Sales</a>
        <a href="#">Reporting</a>
      </div>
    </div>

    <div class="main">
      <div class="doc-hero">
        <div class="doc-hero-tag">System Manual</div>
        <h1>Gotera Core Documentation</h1>
        <p>This documentation section is currently under construction. The manuals and operational guides will be published soon.</p>
        <a href="/" class="back-btn">&larr; Back to Portal</a>
      </div>
    </div>
  </div>

</body>
</html>
